name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.8-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: events_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d events_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg2://app:app@localhost:5432/events_test
      DATABASE_URL: postgresql+psycopg2://app:app@localhost:5432/events_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Verify migrations apply cleanly
        run: alembic upgrade head && alembic downgrade base

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Helm lint
        run: >-
          helm lint helm/event-analytics-api
          --set image.repository=ci/placeholder
          --set image.tag=v0.0.0

      - name: Helm template renders
        run: >-
          helm template ci helm/event-analytics-api
          --set image.repository=ci/placeholder
          --set image.tag=v0.0.0 > /dev/null

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Format check
        run: terraform -chdir=infra fmt -check -recursive

      - name: Validate
        run: |
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

  build-scan:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          load: true
          tags: event-analytics-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: event-analytics-api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
