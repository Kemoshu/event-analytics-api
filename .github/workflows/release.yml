# Deploys on version tags (v1.2.3). Auth is GitHub OIDC -> AWS IAM role;
# there are no long-lived cloud credentials in this repository.
#
# Required repository variables (Settings -> Secrets and variables -> Variables):
#   AWS_REGION            e.g. us-east-1
#   AWS_DEPLOY_ROLE_ARN   from terraform output github_actions_role_arn
#   ECR_REPOSITORY        from terraform output ecr_repository_url
#   EKS_CLUSTER_NAME      from terraform output cluster_name
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  HELM_NAMESPACE: event-analytics
  # Matching the chart name keeps resource names short: the fullname helper
  # collapses release-name-chart-name when they are equal.
  RELEASE_NAME: event-analytics-api

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.8-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: events_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d events_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg2://app:app@localhost:5432/events_test
      DATABASE_URL: postgresql+psycopg2://app:app@localhost:5432/events_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint and test
        run: |
          ruff check .
          pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Assume deploy role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          load: true
          tags: ${{ vars.ECR_REPOSITORY }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ vars.ECR_REPOSITORY }}:${{ github.ref_name }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image
        run: docker push ${{ vars.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Configure kubectl
        run: >-
          aws eks update-kubeconfig
          --region ${{ vars.AWS_REGION }}
          --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Deploy with Helm
        run: >-
          helm upgrade --install ${{ env.RELEASE_NAME }} helm/event-analytics-api
          --namespace ${{ env.HELM_NAMESPACE }}
          --set image.repository=${{ vars.ECR_REPOSITORY }}
          --set image.tag=${{ github.ref_name }}
          --atomic
          --timeout 10m

      - name: Verify rollout
        run: >-
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}
          -n ${{ env.HELM_NAMESPACE }} --timeout=120s
