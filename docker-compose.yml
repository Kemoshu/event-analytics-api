services:
  db:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events"]
      interval: 2s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/events
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/events
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  db_test:
    image: postgres:16.8-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: events_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: test
    profiles: ["test"]
    environment:
      TEST_DATABASE_URL: postgresql+psycopg2://app:app@db_test:5432/events_test
      DATABASE_URL: postgresql+psycopg2://app:app@db_test:5432/events_test
    depends_on:
      db_test:
        condition: service_healthy
    command: ["pytest", "-q"]

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability"]
    environment:
      # Anonymous admin is for local development only.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
